<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>image tags </title>
</head>
<body>
    <!--src: source  alt: alternative text | Self-closing tag -->
    <img src="images/i1.jpg" alt="could not find the image">
    <img src="images/i2.jpg" alt="could not find the image">
    <!-- Commonly used Attributes -->
     <!-- Width & Height -->
    <img src="images/i2.jpg" alt="Could not find the image" width="200px" height="100px"> 
    <!-- Tooltip -->
    <img src="images/i2.jpg" alt="Could not find the image" title="Image of a Dog" >
    <img src="images/i2.jpg" alt="Could not find the image" style="width:200px; height:100px; border-radius:10%; border:2px solid #de0c0c;"> 

    <!-- IMAGE FORMATS -->
    <!-- 1.Jpg 2.PNG 3.GIF 4.SVG 5.webp -->

    <!-- Responsive image via CSS -->
    <img src="images/i2.jpg" alt="Could not find the image" class="responsive-image" width="200px" height="100px"> 
</body>
</html>
